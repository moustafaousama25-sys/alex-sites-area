<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Alex Sites Area" />

<title>Alex Sites Area</title>
<style>
:root{--bg1:#0f172a;--bg2:#020617;--card:#111827;--card2:#020617;--line:#263244;--text:#f8fafc;--muted:#94a3b8;--blue:#2563eb;--green:#16a34a;--red:#7f1d1d;--amber:#f59e0b;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Tahoma,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}
body{padding:calc(16px + env(safe-area-inset-top)) 14px calc(22px + env(safe-area-inset-bottom));}
.wrap{max-width:760px;margin:0 auto}
.card{background:rgba(17,24,39,.96);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 18px 45px rgba(0,0,0,.38)}
.logo{width:62px;height:62px;margin:0 auto 10px;border-radius:18px;background:linear-gradient(135deg,#1e40af,#06b6d4);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:28px;box-shadow:0 10px 25px rgba(37,99,235,.25)}
h1{font-size:24px;margin:0 0 6px;text-align:center;letter-spacing:.2px}
.sub{color:var(--muted);text-align:center;margin-bottom:16px;font-size:14px;line-height:1.6}
label{display:block;margin:10px 0 8px;color:#cbd5e1;font-weight:800}
input{width:100%;border:1px solid #334155;border-radius:16px;background:#020617;color:white;font-size:22px;padding:16px;text-align:center;text-transform:uppercase;outline:none;direction:ltr;letter-spacing:1px}
input:focus{border-color:#60a5fa;box-shadow:0 0 0 4px rgba(96,165,250,.14)}
button,a.btn{display:block;text-decoration:none;text-align:center;border:0;border-radius:16px;padding:15px 14px;color:white;font-weight:850;font-size:16px;cursor:pointer;width:100%;touch-action:manipulation}
.primary{background:var(--blue);margin-top:12px} .success{background:var(--green)} .secondary{background:#334155} .dark{background:#172033} .warn{background:#b45309}
.actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.actions.two{display:flex;justify-content:center}
.actions.two button{max-width:430px}
@media(max-width:620px){.actions.two button{max-width:none}}
.result{margin-top:16px;border:1px solid var(--line);border-radius:20px;padding:14px;background:#020617;display:none}
.result.show{display:block} .notfound{border-color:var(--red);background:#1f0b0b;color:#fecaca}
.site-title{font-size:18px;line-height:1.5;text-align:center} .code{font-weight:950;color:#86efac;direction:ltr;display:inline-block}
.small{font-size:12px;color:#94a3b8;margin-top:5px;line-height:1.5;text-align:center}
.coords{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.box{background:#0b1220;border:1px solid #1e293b;border-radius:15px;padding:12px;direction:ltr;text-align:center;word-break:break-word;font-size:14px}
.box b{display:block;color:#94a3b8;font-size:12px;margin-bottom:5px;direction:ltr}
.detail-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:14px;overflow:hidden;border-radius:16px;border:1px solid #1e293b;background:#07101f}
.detail-table th,.detail-table td{padding:12px;border-bottom:1px solid #1e293b;text-align:left;font-size:14px;vertical-align:top}
.detail-table th{width:43%;color:#cbd5e1;background:#0b1220;font-weight:900}
.detail-table td{color:#f8fafc;word-break:break-word;direction:ltr}
.detail-table tr:last-child th,.detail-table tr:last-child td{border-bottom:0}
.list{margin-top:10px;display:none;max-height:260px;overflow:auto;border:1px solid #1e293b;border-radius:16px;-webkit-overflow-scrolling:touch}
.item{padding:13px;border-bottom:1px solid #1e293b;cursor:pointer;background:#07101f;line-height:1.4}
.item:last-child{border-bottom:0} .item:active{background:#162033}
.hint{color:#94a3b8;font-size:13px;margin-top:14px;line-height:1.7;text-align:center}
.credit{text-align:center;color:#cbd5e1;font-weight:800;margin-top:18px;font-size:13px}
.toast{position:fixed;left:16px;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));background:#111827;color:#fff;border:1px solid #334155;padding:13px;border-radius:16px;text-align:center;display:none;z-index:99}
.toast.show{display:block}
.status{margin-top:10px;text-align:center;color:#94a3b8;font-size:13px;line-height:1.5}
@media(max-width:520px){.card{padding:16px;border-radius:22px}h1{font-size:22px}.coords{grid-template-columns:1fr}input{font-size:21px}.detail-table th,.detail-table td{font-size:13px;padding:11px}}
</style>
</head>

let DATA = loadCachedData() || EMBEDDED_DATA;
let byCode = makeMap(DATA);
let currentRecord = null;

const FIELD_ROWS = [
  ['Office','office'],
  ['Tower Type','towerType'],
  ['Site Type','siteType'],
  ["Battery’s Status",'batteryStatus'],
  ['VIP','vip'],
  ['Permission Owner','permissionOwner'],
  ['Permit Duration','permitDuration'],
  ['Nodal','nodal'],
  ['Cascade','cascade'],
  ['Power Source','powerSource'],
  ['Host','host'],
  ['Host Code','hostCode']

const input = document.getElementById('codeInput');
const result = document.getElementById('result');
const suggestions = document.getElementById('suggestions');
const toast = document.getElementById('toast');
const statusEl = document.getElementById('status');
updateStatus();

function makeMap(arr){ return new Map(arr.map(x => [String(x.code||'').toUpperCase().replace(/\s+/g,''), x])); }
function loadCachedData(){ try{ const raw=localStorage.getItem('alexSitesAreaData_v4'); return raw?JSON.parse(raw):null; }catch(e){return null;} }
function saveCachedData(arr){ localStorage.setItem('alexSitesAreaData_v4', JSON.stringify(arr)); localStorage.setItem('alexSitesAreaUpdatedAt_v4', new Date().toLocaleString()); }
function updateStatus(){ const t=localStorage.getItem('alexSitesAreaUpdatedAt_v4'); statusEl.innerHTML = `Loaded sites: <b>${DATA.length}</b>` + (t ? `<br>Last update: ${escapeHtml(t)}` : '<br>Using embedded data'); }
function mapsUrl(r){ return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.lat+','+r.lng)}`; }
function hasCoords(r){ return r && r.lat && r.lng && !isNaN(Number(r.lat)) && !isNaN(Number(r.lng)); }
function showToast(msg){ toast.textContent = msg; toast.className='toast show'; setTimeout(()=>toast.className='toast',2200); }
function lookup(openMap=false){
  const q = input.value.trim().toUpperCase().replace(/\s+/g,'');
  if(!q){ showToast('Write site code first'); return; }
  const r = byCode.get(q);
  if(r) showRecord(r, openMap); else showNotFound(q);
}
function showRecord(r, openMap=false){
  currentRecord = r;
  const coordsHtml = hasCoords(r) ? `<div class="coords"><div class="box"><b>Latitude</b>${escapeHtml(r.lat)}</div><div class="box"><b>Longitude</b>${escapeHtml(r.lng)}</div></div>` : `<div class="small" style="color:#fca5a5">No valid coordinates for this site.</div>`;
  const details = FIELD_ROWS.map(([label,key]) => `<tr><th>${escapeHtml(label)}</th><td>${escapeHtml(getDisplayValue(r,key))}</td></tr>`).join('');
  result.className = 'result show';
  result.innerHTML = `<div class="site-title"><span class="code">${escapeHtml(r.code)}</span> - ${escapeHtml(r.siteName || '')}</div>
    <div class="small">${escapeHtml(r.address || '')}</div>
    ${coordsHtml}
    <table class="detail-table"><tbody>${details}</tbody></table>
    <div class="actions">
      <button class="success" onclick="openMapButton()">Open Map</button>
      <button class="dark" onclick="copyMapLink()">Copy Google Maps Link</button>
      <button class="dark" onclick="copyDetails()">Copy Site Details</button>
    </div>`;
  suggestions.style.display='none';
  if(openMap) openMapButton();
}
function showNotFound(q){ result.className='result show notfound'; result.innerHTML=`Site code <b style="direction:ltr;display:inline-block">${escapeHtml(q)}</b> not found.`; }
function openMapButton(){ if(!hasCoords(currentRecord)){showToast('No valid coordinates');return;} window.location.href = mapsUrl(currentRecord); }
async function copyMapLink(){ if(!hasCoords(currentRecord)){showToast('No valid coordinates');return;} await copyText(mapsUrl(currentRecord),'Google Maps link copied'); }
function copyDetails(){
  if(!currentRecord) return;
  let lines = [`Site Code: ${currentRecord.code||''}`, `Site Name: ${currentRecord.siteName||''}`];
  FIELD_ROWS.forEach(([label,key]) => lines.push(`${label}: ${getDisplayValue(currentRecord,key)}`));
  if(hasCoords(currentRecord)) lines.push(`Coordinates: ${currentRecord.lat}, ${currentRecord.lng}`);
  copyText(lines.join('\n'),'Site details copied');
}
async function copyText(t,msg){ try{ await navigator.clipboard.writeText(t); showToast(msg||'Copied'); } catch(e){ prompt('Copy:', t); } }
function updateSuggestions(){
  const q=input.value.trim().toUpperCase();
  if(!q){suggestions.style.display='none';return;}
  const matches=DATA.filter(r=>String(r.code||'').toUpperCase().includes(q)||(r.siteName||'').toUpperCase().includes(q)||(r.office||'').toUpperCase().includes(q)).slice(0,14);
  if(!matches.length){suggestions.style.display='none';return;}
  suggestions.innerHTML=matches.map(r=>`<div class="item" onclick="selectCode('${escapeJs(r.code)}')"><span class="code">${escapeHtml(r.code)}</span> - ${escapeHtml(r.siteName||'')}<div class="small">${escapeHtml(r.office||'')}</div></div>`).join('');
  suggestions.style.display='block';
}
function selectCode(code){ input.value=code; lookup(false); }
input.addEventListener('input', updateSuggestions);
input.addEventListener('keydown', e => { if(e.key === 'Enter') { e.preventDefault(); lookup(false); } });

function editLinks(){
  const oldSite = localStorage.getItem('alexSitesSitelistCsv_v4') || DEFAULT_SITELIST_CSV_URL;
  const oldOn = localStorage.getItem('alexSitesOnairCsv_v4') || DEFAULT_ONAIR_CSV_URL;
  const siteUrl = prompt('Paste SiteList CSV link:', oldSite || '');
  if(siteUrl === null) return;
  const onUrl = prompt('Paste On-Air CSV link:', oldOn || '');
  if(onUrl === null) return;
  localStorage.setItem('alexSitesSitelistCsv_v4', siteUrl.trim());
  localStorage.setItem('alexSitesOnairCsv_v4', onUrl.trim());
  showToast('Sheet links saved');
}
async function updateSites(){
  let siteUrl = localStorage.getItem('alexSitesSitelistCsv_v4') || DEFAULT_SITELIST_CSV_URL;
  let onUrl = localStorage.getItem('alexSitesOnairCsv_v4') || DEFAULT_ONAIR_CSV_URL;
  if(!siteUrl){ siteUrl = DEFAULT_SITELIST_CSV_URL; onUrl = DEFAULT_ONAIR_CSV_URL; }
  try{
    statusEl.innerHTML='Updating sites...';
    const siteCsv = await fetchTextWithFallback(siteUrl);
    const onCsv = onUrl ? await fetchTextWithFallback(onUrl) : '';
    const siteRows = parseCSV(siteCsv);
    const onRows = onCsv ? parseCSV(onCsv) : [];
    const updated = buildRecordsFromRows(siteRows, onRows);
    if(!updated.length) throw new Error('No sites parsed. Check CSV headers.');
    DATA = updated; byCode = makeMap(DATA); saveCachedData(DATA); updateStatus(); showToast(`Updated ${DATA.length} sites`);
  }catch(err){ updateStatus(); showToast('Update failed: ' + err.message); console.error(err); }
}
async function fetchTextWithFallback(url){
  const urls=[url, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
  let lastErr;
  for(const u of urls){
    try{ const res=await fetch(u, {cache:'no-store'}); if(!res.ok) throw new Error('HTTP '+res.status); return await res.text(); }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error('Fetch failed');
}
function parseCSV(text){
  text = String(text||'').replace(/^﻿/,'');
  const rows=[]; let row=[], cell='', inQ=false;
  for(let i=0;i<text.length;i++){ const ch=text[i], next=text[i+1];
    if(inQ){ if(ch==='"' && next==='"'){cell+='"';i++;} else if(ch==='"') inQ=false; else cell+=ch; }
    else { if(ch==='"') inQ=true; else if(ch===','){row.push(cell);cell='';} else if(ch==='\n'){row.push(cell); rows.push(row); row=[]; cell='';} else if(ch==='\r'){} else cell+=ch; }
  }
  row.push(cell); rows.push(row);
  let headerIndex = rows.findIndex(r => r.map(normHeader).includes('short code') || r.map(normHeader).includes('site code'));
  if(headerIndex < 0) headerIndex = 0;
  const headers=(rows[headerIndex]||[]).map(h=>normHeader(h));
  return rows.slice(headerIndex+1).filter(r=>r.some(c=>String(c).trim()!=='')).map(r=>Object.fromEntries(headers.map((h,i)=>[h, (r[i]||'').trim()])));
}
function buildRecordsFromRows(siteRows,onRows){
  const onMap = new Map();
  for(const r of onRows){ const c=normCode(getAny(r,['short code','site code','code'])); if(c && !onMap.has(c)) onMap.set(c,r); }
  const out=[]; const seen=new Set();
  for(const r of siteRows){
    const code=normCode(getAny(r,['short code','site code','code'])); if(!code || seen.has(code)) continue; seen.add(code);
    const o=onMap.get(code) || {};
    const coords=getAny(r,['coordinates','coordinate']);
    let lat=getAny(r,['lat','latitude']); let lng=getAny(r,['long','lng','longitude']);
    if((!lat || !lng) && coords){ const p=parseCoords(coords); lat=p[0]; lng=p[1]; }
    out.push({code, siteName:getAny(r,['site name','name'])||getAny(o,['co-located site name']), office:getAny(r,['sc office','office'])||getAny(o,['office']), towerType:getAny(r,['tower type']), siteType:getAny(r,['site type'])||getAny(o,['site type']), batteryStatus:getAny(r,['batteries status','battery status','battery’s status',"battery's status"]), vip:getAny(r,['vip'])||getAny(o,['vip']), permissionOwner:getAny(r,['permission owner']), permitDuration:getAny(r,['permit duration','permit duration ']), nodal:getAny(r,['nodal deg.','nodal','nodal deg']), cascade:getAny(r,['cascade type','cascade']), powerSource:getAny(r,['power source']), host:getAny(r,['host'])||getAny(o,['host']), hostCode:getAny(r,['host code'])||getAny(o,['host code']), lat:String(lat||'').trim(), lng:String(lng||'').trim(), address:getAny(r,['site adress','site address','address']), source:'google-sheet'});
  }
  return out;
}
function normHeader(s){return String(s||'').trim().toLowerCase().replace(/\s+/g,' ');}
function normCode(s){return String(s||'').trim().toUpperCase().replace(/\s+/g,'');}
function getAny(obj,names){ for(const n of names){ const k=normHeader(n); if(obj[k]!==undefined && String(obj[k]).trim()!=='' && String(obj[k]).trim().toLowerCase()!=='#n/a') return obj[k]; } return ''; }
function parseCoords(s){ const m=String(s||'').match(/(-?\d+(?:\.\d+)?)\s*[,،]\s*(-?\d+(?:\.\d+)?)/); return m?[m[1],m[2]]:['','']; }
function valueOrNA(v){ return (v===undefined || v===null || String(v).trim()==='') ? 'N/A' : String(v); }
function getDisplayValue(r,key){
  return valueOrNA(r[key]);
}
function escapeHtml(s){ return String(s??'').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function escapeJs(s){ return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
